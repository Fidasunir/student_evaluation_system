{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartEval</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary-blue: #0d6efd;
            --darker-blue: #2563eb;
            --card-radius: 1.5rem;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--darker-blue);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }

        .split-container {
            display: flex;
            width: 90%;
            max-width: 1000px;
            height: 600px;
            border-radius: var(--card-radius);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            background-color: #fff;
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(145deg, var(--darker-blue), var(--primary-blue));
            color: white;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            text-align: left;
            position: relative;
        }

        .welcome-text {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .headline-text {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .slogan {
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.85;
        }

        .right-panel {
            flex: 1;
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: #fff;
        }

        .form-header h2 {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .form-header p {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 2rem;
        }

        .form-control {
            height: calc(2.25rem + 1.2rem);
            border-radius: 0.5rem;
            border: 1px solid #e0e0e0;
            background-color: #f7f7f7;
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
        }
        
        .form-control:focus {
             border-color: var(--primary-blue);
             box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
        }

        .input-with-icon {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 1rem;
            z-index: 2;
        }
        
        .input-with-icon .form-control {
            padding-left: 3rem;
        }

        .toggle-password {
            right: 1.5rem;
            opacity: 1;
            color: var(--primary-blue);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .btn-login {
            background: var(--darker-blue);
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            padding: 0.75rem;
            margin-top: 1.5rem;
            color: #fff;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            background: #1e3a8a;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.4);
        }

        .extra-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }

        .extra-links a {
            color: var(--primary-blue);
            font-weight: 500;
            text-decoration: none;
        }

        .remember-me {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        
        .remember-me a {
            font-weight: 500;
            color: #6c757d;
        }
        
        .remember-me a:hover {
            color: var(--primary-blue);
        }

        @media (max-width: 850px) {
            .split-container {
                flex-direction: column;
                width: 95%;
                max-width: 450px;
                height: auto;
            }

            .left-panel {
                height: 180px;
                padding: 2rem;
                justify-content: flex-start;
                align-items: flex-start;
                text-align: left;
            }
            
            .right-panel {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="split-container">
    <div class="left-panel">
        <div class="welcome-text">SMART EVAL</div>
        <div class="headline-text"></div>
        <p class="slogan">
            Sign in
        </p>
    </div>

    <div class="right-panel">
        <div class="form-header">
            <h2>Login to SmartEval</h2>
            <p>Enter your credentials to access your account</p>
        </div>

        {% if messages %}
            <div class="mb-3">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} shadow-sm rounded mb-2">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post" id="loginForm" novalidate>
            {% csrf_token %}

            <div class="input-with-icon">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" class="form-control" id="username"
                       placeholder="Username" required autofocus>
            </div>

            <div class="input-with-icon">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" class="form-control" id="password"
                       placeholder="Password" required autocomplete="off">
                <span class="toggle-password" onclick="togglePassword()">
                    <i class="fas fa-eye"></i> SHOW
                </span>
            </div>
            
            <div class="remember-me">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">
                        Remember me
                    </label>
                </div>
                <a href="{% url 'simple_password_reset' %}" class="forgot-password-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-login" id="loginButton">Sign In</button>

            <div class="extra-links">
                Don't have an account? <a href="{% url 'register' %}">Sign Up</a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const form = document.getElementById('loginForm');
    const loginButton = document.getElementById('loginButton');

    username.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            password.focus();
        }
    });

    form.addEventListener('submit', e => {
        if (!username.value.trim() || !password.value.trim()) {
            e.preventDefault();
            if (!username.value.trim()) username.reportValidity();
            else password.reportValidity();
            return false;
        }
        loginButton.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';
        loginButton.disabled = true;
    });
});

function togglePassword() {
    const password = document.getElementById('password');
    const toggleIcon = document.querySelector('.toggle-password i');
    const toggleText = document.querySelector('.toggle-password');

    if (password.type === 'password') {
        password.type = 'text';
        toggleIcon.className = "fas fa-eye-slash";
        toggleText.childNodes[toggleText.childNodes.length - 1].nodeValue = ' HIDE';
    } else {
        password.type = 'password';
        toggleIcon.className = "fas fa-eye";
        toggleText.childNodes[toggleText.childNodes.length - 1].nodeValue = ' SHOW';
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
