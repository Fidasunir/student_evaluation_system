<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Batches - SmartEval</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
  <h2 class="mb-4">Manage Batches</h2>

  <!-- Add Batch Card -->
  <div class="card shadow-sm mb-4">
    <div class="card-header">
      <h5>Add New Batch</h5>
    </div>
    <div class="card-body">
      <form method="POST" class="row g-3">
        {% csrf_token %}
        <div class="col-md-4">
          <label class="form-label">Batch Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Semester</label>
          <select name="semester" class="form-select" required>
            <option value="">Select Semester</option>
            {% for sem in semesters %}
              <option value="{{ sem.id }}">{{ sem.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <button type="submit" class="btn btn-primary">Add Batch</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Existing Batches Table -->
  <div class="card shadow-sm">
    <div class="card-header">
      <h5>Existing Batches</h5>
    </div>
    <div class="card-body">
      <table class="table table-striped table-bordered">
        <thead class="table-light">
          <tr>
            <th>Batch Name</th>
            <th>Semester</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for batch in batches %}
          <tr>
            <td>{{ batch.name }}</td>
            <td>{{ batch.semester.name }}</td>
            <td>
              <form method="POST" class="d-inline">
                {% csrf_token %}
                <input type="hidden" name="delete_batch_id" value="{{ batch.id }}">
                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
              </form>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="3" class="text-center">No batches available.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
