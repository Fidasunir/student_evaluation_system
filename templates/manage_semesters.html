<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Semesters - SmartEval</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
  <h2 class="mb-4">Manage Semesters</h2>

  <!-- Add Semester Card -->
  <div class="card shadow-sm mb-4">
    <div class="card-header">
      <h5>Add New Semester</h5>
    </div>
    <div class="card-body">
      <form method="POST" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6">
          <label class="form-label">Semester Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>
        <div class="col-md-6 d-flex align-items-end">
          <button type="submit" class="btn btn-primary">Add Semester</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Existing Semesters Table -->
  <div class="card shadow-sm">
    <div class="card-header">
      <h5>Existing Semesters</h5>
    </div>
    <div class="card-body">
      <table class="table table-striped table-bordered">
        <thead class="table-light">
          <tr>
            <th>Semester Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for sem in semesters %}
          <tr>
            <td>{{ sem.name }}</td>
            <td>
              <form method="POST" class="d-inline">
                {% csrf_token %}
                <input type="hidden" name="delete_semester_id" value="{{ sem.id }}">
                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
              </form>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="2" class="text-center">No semesters available.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
