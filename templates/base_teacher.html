{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Teacher Dashboard{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      height: 100vh;
      background-color: #0f172a;
      position: fixed;
      top: 0;
      left: 0;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1.5rem 1rem;
    }

    .sidebar h4 {
      text-align: center;
      font-weight: 600;
      color: #10b981;
    }

    .nav-link {
      color: #cbd5e1;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .nav-link.active,
    .nav-link:hover {
      color: #10b981;
      background-color: rgba(16, 185, 129, 0.15);
      border-radius: 8px;
    }

    /* Main content area */
    .main-content {
      margin-left: 260px;
      padding: 2rem;
    }

  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div>
    <h4>SmartEval</h4>
    <hr class="border-secondary">
    <nav class="nav flex-column">
      <a class="nav-link {% if request.resolver_match.url_name == 'teacher_dashboard' %}active{% endif %}" href="{% url 'teacher_dashboard' %}">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
      </a>
      
     
      <a class="nav-link" href="#"><i class="bi bi-bar-chart me-2"></i> Analytics</a>
    </nav>
  </div>

  <form method="POST" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-outline-light w-100 mt-3">
      <i class="bi bi-box-arrow-right me-1"></i> Logout
    </button>
  </form>
</div>

<!-- Page-specific content -->
<div class="main-content">
  {% block content %}
  {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
