{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish Quiz - {{ quiz.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-5">
  <h2>Publish Quiz: {{ quiz.title }}</h2>
  <form method="post">
    {% csrf_token %}
    <label>Select Batches:</label>
    {% for batch in batches %}
      <div class="form-check">
        <input type="checkbox" name="batches" value="{{ batch.id }}" class="form-check-input" id="batch{{ batch.id }}">
        <label class="form-check-label" for="batch{{ batch.id }}">{{ batch.name }}</label>
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-success mt-3">Publish Quiz</button>
  </form>
</div>

</body>
</html>
